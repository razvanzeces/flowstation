# FlowStation TETRA configuration file
# DO NOT START without editing to comply with the legal limits in your jurisdiction

config_version = "0.6"

# Stack operating mode: "Bs" (Base Station), "Ms" (Mobile Station), or "Mon" (Monitor)
stack_mode = "Bs"

# Uncomment to enable verbose logging. Files grow fast and generate additional load.
# debug_log = "./verbose_log.txt"

###############################################################################
# FALLBACK CONFIG
#
# If FlowStation fails to parse this config file (e.g. after a bad edit in the
# dashboard), it automatically tries the fallback file at the same path with
# ".fallback" appended — e.g. /opt/tetra/config.toml.fallback
#
# The fallback file is NEVER overwritten automatically. Create it once with a
# known-good config and leave it alone:
#
#   cp config.toml config.toml.fallback
#
# When the fallback is active, the dashboard shows a persistent red warning
# banner and logs the parse error from the primary config. This lets you fix
# the broken config.toml from the dashboard without losing remote access.
###############################################################################

###############################################################################

[phy_io]

# Input type: set to SoapySdr.
backend = "SoapySdr"

# DEBUG/TEST CODE. Capture files grow fast.
# dl_tx_file = "./dl_output.bin"    # Debug; uncomment to save generated DL RF samples
# ul_rx_file = "./ul_output.bin"    # Debug; uncomment to save received UL RF samples

[phy_io.soapysdr]
# Transmit tx(dl) and receive rx(ul) frequencies in Hz
# !!! Make sure to also edit the corresponding fields in the cell_info section.
tx_freq = 438025000
rx_freq = 433025000

# Adjust if your SDR has a non-negligible tuning error
# ppm_err = 0.0

################################################################################################
## OPTIONAL: specific device, antenna, gain selection                                        ##
## Check your device with SoapySDRUtil --probe                                               ##
## or: https://github.com/MidnightBlueLabs/tetra-bluestation-docs/wiki/03-Configuration     ##
################################################################################################

# Optional device selection arguments.
# If not specified, the first compatible device found is selected automatically.
# device = "driver=plutosdr,uri=ip:192.168.42.42"
# device = "driver=lime,serial=123456789"

# Optional antenna selection (overrides device defaults)
# rx_antenna = "LNAW"
# tx_antenna = "BAND2"

# Optional gain values (override device defaults)
# Check valid gain names with SoapySDRUtil --probe
# tx_gain_pad = 50.0
# rx_gain_lna = 30.0

###############################################################################

[net_info]
# Mobile Country Code (MCC) - identifies your country
mcc = 204  # Netherlands

# Mobile Network Code (MNC) - identifies the TETRA network
# MAKE SURE THE MNC CAN BE USED, CONSULT RELEVANT AUTHORITIES IF NECESSARY
mnc = 1337

###############################################################################

[cell_info]

# See ETSI TS 100 392-15 V1.5.1 Clause 6: Duplex spacing
freq_band = 4                       # 400MHz band
main_carrier = 1521                 # + 1521 * 25kHz = 38250kHz
duplex_spacing = 4                  # Use 5MHz spacing between ul and dl (for 400 MHz band)
# custom_duplex_spacing = 7600000   # Do not uncomment unless you have programmed a custom duplex spacing entry in your radios
freq_offset = 0                     # Carrier offset. Usually 0. Options: 0, 6250, -6250, 12500 Hz.
reverse_operation = false           # False: UL below DL. True: UL above DL.

# Location area identifier
location_area = 2

# Colour code (0-63), helps distinguish adjacent cells on the same frequency
colour_code = 1

# IANA timezone for time broadcasting via D-NWRK-BROADCAST. When set, the BS will
# broadcast UTC time and local time offset once per hyperframe (~61s) so that
# radios can synchronize their clocks. Daylight saving time is handled automatically.
# timezone = "Europe/Bucharest"

# Local SSI ranges for this cell. Traffic for these ranges will not leave the cell.
# Overrides any settings in the brew section, if enabled.
# Incoming brew traffic on these ranges will also be rejected.
# The end of the range is INCLUSIVE — the end number IS in the range.
local_ssi_ranges = [
    [0, 90],
]

# Cell services. Leave the defaults unless you know what you're changing.
system_wide_services = true  # If false, radios will operate in fallback mode (ignored when Brew is enabled)
voice_service = true

# Group call hangtime in seconds.
# How long the circuit of an inactive group call stays open after the last speaker
# releases the floor, before the call is disconnected.
# During hangtime, any MS can resume the floor without a new D-SETUP/D-CONNECT cycle.
# Default: 5 seconds. Valid range: 0–300.
# hangtime_secs = 5

# Maximum active call duration in seconds — ETSI EN 300 392-2 §14.9.1 T310 equivalent (FlowStation).
# After this time the BS sends D-RELEASE regardless of call activity.
# 0 = no limit (infinite — call runs until U-DISCONNECT or hangtime).
# Default: 120. Valid range: 30–86400, or 0 for no limit.
# call_timeout_secs = 120

# UL inactivity timeout in seconds: if no voice frames are received from the transmitting
# MS during this time, the BS forces TX-CEASED and enters hangtime.
# Must be greater than T.213 (1s) to tolerate DTX and short RF fading.
# Default: 3 seconds. Valid range: 1–30.
# ul_inactivity_secs = 3

# Periodic registration interval in seconds — ETSI T351 equivalent (FlowStation).
# MS must re-register within this interval or be automatically deregistered by the BS.
# The BS signals this via D-LOCATION-UPDATE-ACCEPT (PeriodicLocationUpdating).
# On expiry: D-LOCATION-UPDATE-REJECT (ExpiryOfTimer) is sent; terminal re-attaches immediately.
# 0 = disabled — registrations never expire.
# Default: 3600 (1 hour). Valid range when non-zero: 60–86400.
# periodic_registration_secs = 3600

###############################################################################
# OPTIONAL: Home Mode Display (PID 220)
#
# Periodically broadcasts a text string to all MSs on the cell via D-SDS-DATA.
# The MS displays this text on its home screen (e.g. base station callsign).
# Enabled by the presence of this sub-section; remove to disable.
#
# [cell_info.home_mode_display]
# source_issi = 16777215          # ISSI shown as sender on the radio (default: 16777215)
# interval_multiframes = 96       # Broadcast interval (1 MF ≈ 1s; default: 96 ≈ 96s)
# protocol_id = 220               # SDS protocol ID for Home Mode Display (default: 220)
# text_coding_scheme = "LATIN"    # "LATIN" = ISO-8859-1, "UTF16" = UCS-2/UTF-16BE
# text = "FlowStation"            # Text shown on radio display
###############################################################################

###############################################################################
# OPTIONAL: Supplemental SDS broadcast (FlowStation)
#
# A second periodic SDS broadcast sent alongside the Home Mode Display (PID 220).
# Uses the same mechanism but with a configurable protocol ID and text.
# Useful for sending additional data to radios that support custom PIDs.
# Enabled by the presence of this sub-section; remove to disable.
#
# [cell_info.sds_broadcast]
# source_issi = 16777215          # ISSI shown as sender on the radio (default: 0)
# interval_multiframes = 96       # Broadcast interval (1 MF ≈ 1s; default: 96 ≈ 96s)
# protocol_id = 130               # SDS protocol ID (default: 220 — change to avoid conflict)
# text_coding_scheme = "LATIN"    # "LATIN" = ISO-8859-1, "UTF16" = UCS-2/UTF-16BE
# text = "YO6RZV"                 # Text payload to broadcast
###############################################################################

###############################################################################
# OPTIONAL: Remote control via U-STATUS (FlowStation)
#
# Allows authorized radios to trigger BS actions remotely by sending a U-STATUS
# message to ISSI 9999 (the BS control address) from the radio menu.
# Only ISSIs listed in authorized_issis can trigger commands.
# Unrecognized status codes from authorized radios are silently ignored.
# Enabled by the presence of this sub-section; remove to disable.
#
# Available actions:
#   "restart"   — restarts the FlowStation service (equivalent to systemctl restart tetra)
#   "shutdown"  — stops the FlowStation service (must be restarted manually or via systemd)
#   "kick_all"  — deregisters all currently registered terminals; they re-attach immediately
#
# [cell_info.sds_command_control]
# authorized_issis = [2260570, 2260571]   # ISSIs allowed to send commands
#
# [[cell_info.sds_command_control.commands]]
# status_code = 32001             # U-STATUS code sent from the radio to ISSI 9999
# action = "restart"
#
# [[cell_info.sds_command_control.commands]]
# status_code = 32002
# action = "shutdown"
#
# [[cell_info.sds_command_control.commands]]
# status_code = 32003
# action = "kick_all"
###############################################################################

###############################################################################

# OPTIONAL: ISSI access control — whitelist (FlowStation)
#
# When issi_whitelist is non-empty, only listed ISSIs can register.
# All others receive D-LOCATION-UPDATE-REJECT and cannot make or receive calls.
# Leave empty or omit the section entirely to accept any terminal (open network).
#
# [security]
# issi_whitelist = [2260571, 2260572, 2260575]

###############################################################################

# OPTIONAL: Web dashboard — accessible at http://<BTS-IP>:8080 (FlowStation)
#
# Live view of terminals, active calls, log, config editor, kick and SDS.
#
# [dashboard]
# port = 8080
# bind = "0.0.0.0"
#
# OPTIONAL: HTTP Basic Auth — protect the dashboard with a username and password.
# When set, the browser will show a native login dialog on first access.
# Both username and password must be set together, or neither.
#
# SECURITY NOTE: HTTP Basic Auth transmits credentials as base64 (not encrypted).
# This protects against casual/accidental access on a LAN, but is NOT secure over
# the public internet without TLS. For internet-facing use, put a reverse proxy
# with HTTPS (e.g. nginx, Caddy) in front of the dashboard.
#
# username = "admin"
# password = "changeme"
#
# OPTIONAL: explicit path to the FlowStation git source directory used by the
# "Update" button. By default the dashboard auto-detects by walking up from the
# binary path looking for a .git directory, then trying /opt/tetra-bluestation,
# /opt/flowstation, /opt/tetra-bs, /opt/tetra. Set this if your binary lives
# outside the git clone (e.g. binary copied to /usr/local/bin/, sources in /opt/...)
# or if auto-detection finds the wrong directory.
# source_dir = "/opt/tetra-bluestation"

###############################################################################

# Brew Protocol: Connect to TetraPack/BrandMeister server via TETRA Homebrew Protocol.
# All groups that radios affiliate to are transmitted to Brew as affiliations.
# Uncomment this section to automatically enable the Brew entity.
# See: https://wiki.tetrapack.online/books/tetra/page/brew

# [brew]

# Server address
# host = "core.tetraflow.ro"
# port = 9000

# Use TLS (wss:// / https://)
# tls = true

# HTTP Digest authentication credentials, registered in BrandMeister.
# Username should be your SSID (DMR ID + 2-digit suffix).
# Password is your BrandMeister hotspot password.
# username = 123456700
# password = "012345"

# Reconnect delay (seconds)
# reconnect_delay_secs = 15

# Additional initial latency in frames for inbound Brew jitter playback.
# Default: 0. Increase if you hear audio artifacts at the start of transmissions.
# jitter_initial_latency_frames = 0

# Enable SDS forwarding between local clients and Brew. Enabled by default.
# feature_sds_enabled = true

# Export RSSI measurements to the Brew server as Service (0xf4) JSON messages.
# Disabled by default. Enable if your Brew server supports RSSI data ingestion.
# When enabled, each radio's signal level is sent at most once every 5 seconds.
# Format: {"issi": 2260570, "rssi_dbfs": -42.3}
# feature_rssi_export = false

# Uncomment to allow only calls for selected SSIs to be forwarded through Brew.
# If left commented, all calls (outside local_ssi_ranges) are allowed through Brew.
# whitelisted_ssis = [91]
