# FlowStation TETRA configuration file
# DO NOT START without editing to comply with the legal limits in your jurisdiction

config_version = "0.6"

# Stack operating mode: "Bs" (Base Station), "Ms" (Mobile Station), or "Mon" (Monitor)
stack_mode = "Bs"

# Uncomment to enable verbose logging. Files grow fast and generate additional load.
# debug_log = "./verbose_log.txt"

# Optional explicit systemd service unit name. Used by SDS command control
# (restart/shutdown) and the dashboard OTA update button. When unset, FlowStation
# tries to auto-detect via /proc/self/cgroup, then falls back to
# "tetra-bluestation.service". Set this if your unit has a custom name.
# Environment variable FLOWSTATION_SERVICE_UNIT also works.
# service_name = "tetra"

###############################################################################
# FALLBACK CONFIG
#
# If FlowStation fails to parse this config file (e.g. after a bad edit in the
# dashboard), it automatically tries the fallback file at the same path with
# ".fallback" appended — e.g. /opt/tetra/config.toml.fallback
#
# The fallback file is NEVER overwritten automatically. Create it once with a
# known-good config and leave it alone:
#
#   cp config.toml config.toml.fallback
#
# When the fallback is active, the dashboard shows a persistent red warning
# banner and logs the parse error from the primary config. This lets you fix
# the broken config.toml from the dashboard without losing remote access.
###############################################################################

###############################################################################

[phy_io]

# Input type: set to SoapySdr.
backend = "SoapySdr"

# DEBUG/TEST CODE. Capture files grow fast.
# dl_tx_file = "./dl_output.bin"    # Debug; uncomment to save generated DL RF samples
# ul_rx_file = "./ul_output.bin"    # Debug; uncomment to save received UL RF samples
#
# Read-side counterparts: replay RF samples FROM a file instead of the SDR.
# Leave commented for normal (live SDR) operation.
# ul_input_file = "./ul_input.bin"  # Debug; feed recorded UL RF samples in place of the radio
# dl_input_file = "./dl_input.bin"  # Debug; feed recorded DL RF samples in place of generation

[phy_io.soapysdr]
# Transmit tx(dl) and receive rx(ul) frequencies in Hz
# !!! Make sure to also edit the corresponding fields in the cell_info section.
tx_freq = 438025000
rx_freq = 433025000

# Adjust if your SDR has a non-negligible tuning error
# ppm_err = 0.0

# Optional sample rate (samples/sec) applied to both RX and TX.
# If unset, the device-specific default is used.
# sample_rate = 1800000

# Optional SDR center frequencies in Hz for dual-carrier / phase-modulated operation.
# For a single carrier, leave these commented and the radio tunes directly to tx_freq/rx_freq.
# For adjacent carriers, place the center frequency midway between main_carrier and
# secondary_carrier so both 25 kHz channels fit inside one SDR passband.
# tx_center_freq = 438037500
# rx_center_freq = 433037500

# Optional RX/TX channel index for multi-channel SDRs (e.g. LimeSDR, USRP).
# If unset, the device default channel (usually 0) is used.
# rx_channel = 0
# tx_channel = 0

################################################################################################
## OPTIONAL: specific device, antenna, gain selection                                        ##
## Check your device with SoapySDRUtil --probe                                               ##
## or: https://github.com/MidnightBlueLabs/tetra-bluestation-docs/wiki/03-Configuration     ##
################################################################################################

# Optional device selection arguments.
# If not specified, the first compatible device found is selected automatically.
# device = "driver=plutosdr,uri=ip:192.168.42.42"
# device = "driver=lime,serial=123456789"

# Optional antenna selection (overrides device defaults)
# rx_antenna = "LNAW"
# tx_antenna = "BAND2"

################################################################################################
## GAIN ELEMENTS                                                                             ##
## Gains are per-element and REPEATABLE: add one line per gain stage your device exposes,    ##
## named  rx_gain_<element>  /  tx_gain_<element> . The <element> name comes from the device ##
## — list the valid names with:   SoapySDRUtil --probe                                       ##
## (e.g. PlutoSDR: PGA ; LimeSDR: LNA, TIA, PGA, PAD ; etc.)                                  ##
##                                                                                           ##
## Values MUST be numbers (integer or float). A non-numeric value aborts startup with        ##
## "RX/TX gain value must be a number". NOTE: a bare  rx_gain = 30  is NOT accepted — only    ##
## rx_gain_<element>. Any element you omit falls back to the device default.                  ##
################################################################################################

# Example: set multiple RX gain stages
# rx_gain_lna = 30.0
# rx_gain_tia = 9.0
# rx_gain_pga = 12.0

# Example: set multiple TX gain stages
# tx_gain_pad = 50.0
# tx_gain_iamp = 0.0

###############################################################################

[net_info]
# Mobile Country Code (MCC) - identifies your country
mcc = 204  # Netherlands

# Mobile Network Code (MNC) - identifies the TETRA network
# MAKE SURE THE MNC CAN BE USED, CONSULT RELEVANT AUTHORITIES IF NECESSARY
mnc = 1337

###############################################################################

[cell_info]

# See ETSI TS 100 392-15 V1.5.1 Clause 6: Duplex spacing
freq_band = 4                       # 400MHz band
main_carrier = 1521                 # + 1521 * 25kHz = 38250kHz
# secondary_carrier = 1522          # Optional second carrier, typically adjacent (+/- 25 kHz)
# dual_carrier_enabled = true        # Dashboard "Dual-Carrier ON/OFF" switch for the carrier above.
                                     # Absent = on. Set false to keep the number but run single-carrier.
duplex_spacing = 4                  # Use 5MHz spacing between ul and dl (for 400 MHz band)
# custom_duplex_spacing = 7600000   # Do not uncomment unless you have programmed a custom duplex spacing entry in your radios
freq_offset = 0                     # Carrier offset. Usually 0. Options: 0, 6250, -6250, 12500 Hz.
reverse_operation = false           # False: UL below DL. True: UL above DL.

# Location area identifier
location_area = 2

# Colour code (0-63), helps distinguish adjacent cells on the same frequency
colour_code = 1

# IANA timezone for time broadcasting via D-NWRK-BROADCAST. When set, the BS will
# broadcast UTC time and local time offset once per hyperframe (~61s) so that
# radios can synchronize their clocks. Daylight saving time is handled automatically.
# timezone = "Europe/Bucharest"

# Local SSI ranges for this cell. Traffic for these ranges will not leave the cell.
# Overrides any settings in the brew section, if enabled.
# Incoming brew traffic on these ranges will also be rejected.
# The end of the range is INCLUSIVE — the end number IS in the range.
local_ssi_ranges = [
    [0, 90],
]

# Cell services. Leave the defaults unless you know what you're changing.
system_wide_services = true  # If false, radios will operate in fallback mode (ignored when Brew is enabled)
voice_service = true

# Group call hangtime in seconds.
# How long the circuit of an inactive group call stays open after the last speaker
# releases the floor, before the call is disconnected.
# During hangtime, any MS can resume the floor without a new D-SETUP/D-CONNECT cycle.
# Default: 5 seconds. Valid range: 0–300.
# hangtime_secs = 5

# Legacy-radio workaround: tear a group call down on a SAME-SPEAKER floor retake during hangtime
# instead of reusing the open circuit, so the next PTT runs a full U-SETUP/D-CONNECT/D-SETUP
# cycle. Old Motorola sets (MR5/MR19 era) ACK a fast retake grant but never key up the TCH/S,
# producing a "silent over" the rest of the group hears as dead air; forcing a fresh setup fixes
# it. Default OFF — modern radios reuse the circuit fine and benefit from the lower retake
# latency, so enable this only on cells that still run those legacy sets.
# release_group_on_same_speaker_retake = false

# DGNA (Dynamic Group Number Assignment) air-interface mechanism.
# ON (default): an operator regroup goes out as an SS-DGNA ASSIGN/DEASSIGN carried in a CMCE
# D-FACILITY (ETSI TS 100 392-12-22 V1.5.1; transport EN 300 392-9 V1.7.1). That SS PDU both
# *defines* the group (mnemonic/parameters) AND attaches it in one step, which is what makes a
# dynamic talkgroup appear and be selectable on a real terminal.
# OFF: falls back to the legacy MM-only D-ATTACH/DETACH GROUP IDENTITY (EN 300 392-2 V2.4.1
# cl.16.8), which only toggles the L2 attachment of a group the radio already knows — a bare GSSI
# the radio was never told about has nothing to name or select. Kept as a rollback switch.
# NB: even a correct SS-DGNA shows nothing unless DGNA notification is provisioned in the terminal
# codeplug — that is a codeplug gap, not a stack bug.
# Absent = true. Set false only to roll back to the legacy path.
# dgna_use_ss_facility = true

# Optional talkgroup display names, keyed by GSSI. When you assign a group via DGNA, the SS-DGNA
# ASSIGN carries this name as the mnemonic, so a terminal that renders DGNA names shows the name
# instead of the bare number. Names are ISO-8859-1 and truncated to 15 characters on the air.
# NB: same codeplug caveat as above — a terminal that doesn't render the DGNA mnemonic still shows
# its own provisioned name (or the number) regardless of what we send.
# dgna_group_names = { "22" = "Echo", "1" = "Main" }

# Maximum active call duration in seconds — ETSI EN 300 392-2 §14.9.1 T310 equivalent (FlowStation).
# After this time the BS sends D-RELEASE regardless of call activity.
# 0 = no limit (infinite — call runs until U-DISCONNECT or hangtime).
# Default: 120. Valid range: 30–86400, or 0 for no limit.
# call_timeout_secs = 120

# UL inactivity timeout in seconds: if no voice frames are received from the transmitting
# MS during this time, the BS forces TX-CEASED and enters hangtime.
# Must be greater than T.213 (1s) to tolerate DTX and short RF fading.
# Default: 3 seconds. Valid range: 1–30.
# ul_inactivity_secs = 3

# Periodic registration interval in seconds — ETSI T351 equivalent (FlowStation).
# MS must re-register within this interval, signalled via D-LOCATION-UPDATE-ACCEPT
# (PeriodicLocationUpdating).
# On expiry the BS RE-ATTRACTS the terminal with D-LOCATION-UPDATE-COMMAND (addressed by ISSI),
# and keeps its registration + group affiliations — it does NOT send REJECT(ExpiryOfTimer) and
# does NOT remove the client. This is deliberate: removing wipes a Motorola's stored groups so a
# later group-report-less re-registration leaves nothing to re-affiliate (PTT denied), and
# REJECT(ExpiryOfTimer) drops Motorola radios to "no service". A gone radio is simply re-attracted
# once per interval and re-affiliated automatically when it returns.
# 0 = disabled — registrations never expire.
# Default: 3600 (1 hour). Valid range when non-zero: 60–86400.
# periodic_registration_secs = 3600

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL: additional cell service flags (advertised in the SYSINFO broadcast).
# Leave at their defaults unless you know what you are changing.
# registration              = true   # cell accepts MS registration (location updating)
# deregistration            = true   # cell accepts MS deregistration
# priority_cell             = false  # advertise this cell as a priority cell for reselection
# no_minimum_mode           = false  # cell never falls back to minimum mode
# migration                 = false  # cell supports inter-network migration
# circuit_mode_data_service = false  # advertise circuit-mode data service
# aie_service               = false  # advertise Air Interface Encryption (AIE) service
# sndcp_service             = false  # advertise TETRA packet-data (SNDCP) service
# advanced_link             = false  # advertise the advanced (enhanced data) link

# ─────────────────────────────────────────────────────────────────────────────
# OPTIONAL: SYNC / low-level cell parameters. Defaults are fine for nearly all
# deployments — only touch these if you understand the ETSI MAC/MLE fields.
# neighbor_cell_broadcast = 0       # 2-bit D-MLE-SYNC neighbor-cell broadcast mode (default 0)
# late_entry_supported    = false   # advertise late-entry support in D-MLE-SYNC (default false)
# system_code             = 3       # SYNC system code; 3 = ETSI EN 300 392-2 V3.1.1 (default 3)
# sharing_mode            = 0       # carrier sharing mode (0 = continuous transmission; default 0)
# ts_reserved_frames      = 0       # timeshare reserved frames per multiframe (default 0)
# u_plane_dtx             = false   # advertise U-plane DTX (discontinuous TX) support (default false)
# frame_18_ext            = false   # frame-18 extension flag in SYNC (default false)
# ms_txpwr_max_cell       = 4       # max MS TX power index (Table 18.57; 4 = 30 dBm / 1 W; default 4)
# subscriber_class        = 0xFFFF  # 16-bit mask of subscriber classes allowed on this cell (default all)

###############################################################################
# OPTIONAL: Neighbor Cell Broadcast (NCB)
#
# Advertises adjacent TETRA cells to terminals so they know where to roam.
# Broadcast in D-NWRK-BROADCAST PDU, alongside the network time (~61s cadence).
# Up to 7 neighbor cells supported. Each must have a unique cell_identifier_ca
# and a unique main_carrier_number.
#
# Per ETSI EN 300 392-2 clause 18.5.17 / Table 18.64.
#
# Add one [[cell_info.neighbor_cells_ca]] block per neighboring cell.
# Comment out the whole section if you have no neighbors.
#
# [[cell_info.neighbor_cells_ca]]
# cell_identifier_ca = 1                # 0-31, unique within CA cluster
# cell_reselection_types_supported = 1  # 0=none, 1=announced, 2=unannounced, 3=both
# neighbor_cell_synchronized = false    # true if time-sync'd with us
# cell_load_ca = 0                      # 0=low, 1=medium-low, 2=medium-high, 3=high
# main_carrier_number = 1525            # 0-4095, must differ from our main_carrier
#
# Optional fields (omit if not needed):
# main_carrier_number_extension = 0     # 0-1023 (only if carrier > 4095 needed)
# mcc = 204                             # 0-1023, only set if neighbor on different MCC
# mnc = 1337                            # 0-16383, only set if neighbor on different MNC
# location_area = 3                     # 0-16383, neighbor's location area
# maximum_ms_transmit_power = 7         # 0-7 (0=lowest, 7=highest TX power for MS)
# minimum_rx_access_level = 0           # 0-15 (minimum RSSI level for cell access)
# subscriber_class = 0xFFFF             # 16 bits, which subscriber classes can access
# timeshare_cell_information_or_security_parameters = 0  # 0-31
# tdma_frame_offset = 0                 # 0-63, TDMA frame offset vs our cell
#
# Optional per-neighbor BS service details — advertise which services the neighbor
# supports (mirrors the top-level cell service flags). Omit to leave unset.
# [cell_info.neighbor_cells_ca.bs_service_details]
# registration = true                 # neighbor accepts registration
# deregistration = true               # neighbor accepts deregistration
# priority_cell = false               # neighbor is a priority cell
# no_minimum_mode = false             # neighbor never enters minimum mode
# migration = false                   # neighbor supports migration
# system_wide_services = false        # neighbor offers system-wide services
# voice_service = true                # neighbor offers voice service
# circuit_mode_data_service = false   # neighbor offers circuit-mode data
# sndcp_service = false               # neighbor offers packet data (SNDCP)
# aie_service = false                 # neighbor offers air-interface encryption
# advanced_link = false               # neighbor offers the advanced (enhanced data) link
#
# Example with two neighbors:
# [[cell_info.neighbor_cells_ca]]
# cell_identifier_ca = 1
# cell_reselection_types_supported = 1
# neighbor_cell_synchronized = false
# cell_load_ca = 0
# main_carrier_number = 1525
#
# [[cell_info.neighbor_cells_ca]]
# cell_identifier_ca = 2
# cell_reselection_types_supported = 1
# neighbor_cell_synchronized = false
# cell_load_ca = 0
# main_carrier_number = 1529
###############################################################################

###############################################################################
# OPTIONAL: Home Mode Display (PID 220)
#
# Periodically broadcasts a text string to all MSs on the cell via D-SDS-DATA.
# The MS displays this text on its home screen (e.g. base station callsign).
# Enabled by the presence of this sub-section; remove to disable.
#
# [cell_info.home_mode_display]
# source_issi = 16777215          # ISSI shown as sender on the radio (default: 16777215)
# interval_multiframes = 96       # Broadcast interval (1 MF ≈ 1s; default: 96 ≈ 96s)
# protocol_id = 220               # SDS protocol ID for Home Mode Display (default: 220)
# text_coding_scheme = "LATIN"    # "LATIN" = ISO-8859-1, "UTF16" = UCS-2/UTF-16BE
# text = "FlowStation"            # Text shown on radio display
###############################################################################

###############################################################################
# OPTIONAL: Supplemental SDS broadcast (FlowStation)
#
# A second periodic SDS broadcast sent alongside the Home Mode Display (PID 220).
# Uses the same mechanism but with a configurable protocol ID and text.
# Useful for sending additional data to radios that support custom PIDs.
# Enabled by the presence of this sub-section; remove to disable.
#
# [cell_info.sds_broadcast]
# source_issi = 16777215          # ISSI shown as sender on the radio (default: 0)
# interval_multiframes = 96       # Broadcast interval (1 MF ≈ 1s; default: 96 ≈ 96s)
# protocol_id = 130               # SDS protocol ID (default: 220 — change to avoid conflict)
# text_coding_scheme = "LATIN"    # "LATIN" = ISO-8859-1, "UTF16" = UCS-2/UTF-16BE
# text = "YO6RZV"                 # Text payload to broadcast
###############################################################################

###############################################################################
# OPTIONAL: Remote control via U-STATUS (FlowStation)
#
# Allows authorized radios to trigger BS actions remotely by sending a U-STATUS
# message to ISSI 9999 (the BS control address) from the radio menu.
# Only ISSIs listed in authorized_issis can trigger commands.
# Unrecognized status codes from authorized radios are silently ignored.
# Enabled by the presence of this sub-section; remove to disable.
#
# Available actions:
#   "restart"   — restarts the FlowStation service (equivalent to systemctl restart tetra)
#   "shutdown"  — stops the FlowStation service (must be restarted manually or via systemd)
#   "kick_all"  — deregisters all currently registered terminals; they re-attach immediately
#   "ip"        — replies (SDS to the requester) with the host's primary IP address
#   "temp"      — replies (SDS to the requester) with the host CPU/SoC temperature
#   "info"      — replies (SDS to the requester) with version + IP + temperature
#
# The "ip"/"temp"/"info" actions answer the requesting radio with a text SDS, so the operator
# can query a station (e.g. on a hotspot with an unknown IP) straight from the radio menu.
# Only authorized_issis get a reply.
#
# [cell_info.sds_command_control]
# authorized_issis = [2260570, 2260571]   # ISSIs allowed to send commands
#
# [[cell_info.sds_command_control.commands]]
# status_code = 32001             # U-STATUS code sent from the radio to ISSI 9999
# action = "restart"
#
# [[cell_info.sds_command_control.commands]]
# status_code = 32002
# action = "shutdown"
#
# [[cell_info.sds_command_control.commands]]
# status_code = 32003
# action = "kick_all"
#
# [[cell_info.sds_command_control.commands]]
# status_code = 32010
# action = "ip"
#
# [[cell_info.sds_command_control.commands]]
# status_code = 32011
# action = "temp"
#
# [[cell_info.sds_command_control.commands]]
# status_code = 32012
# action = "info"
###############################################################################

###############################################################################

# OPTIONAL: ISSI access control — whitelist (FlowStation)
#
# When issi_whitelist is non-empty, only listed ISSIs can register.
# All others receive D-LOCATION-UPDATE-REJECT and cannot make or receive calls.
# Leave empty or omit the section entirely to accept any terminal (open network).
#
# [security]
# issi_whitelist = [2260571, 2260572, 2260575]

###############################################################################

# OPTIONAL: Restart recovery (FlowStation)
#
# After the BS process restarts (update / crash / service restart) the in-RAM registry is
# empty, yet radios are still RF-camped on the cell — so the first group PTT fails until each
# radio re-registers on its own (often only on power-cycle). When enabled, FlowStation persists
# a small JSON cache of known terminals (ISSI + persistent groups + energy mode) and, on the
# next startup, proactively sends D-LOCATION-UPDATE-COMMAND (ETSI EN 300 392-2 §16.4.4) to each,
# forcing re-registration + group re-report so PTT works again within seconds, no human action.
#
# The proactive cache replay is OFF by default: keying COMMANDs at a batch of ISSIs right after
# boot adds MCCH load, so it is opt-in. Pairs with cell_info.periodic_registration_secs (T351).
#
# A second, lighter mechanism — reactive_enabled — is ON by default and needs no cache: it watches
# the uplink and, the moment an unknown but network-permitted radio transmits (any PTT/SDS/random
# access), keys it one rate-limited D-LOCATION-UPDATE-COMMAND to force re-registration. It fires
# only in response to a radio that is demonstrably present, so it is RF-cheap and heals the common
# "PTT does nothing after a BS restart" case the cache can miss. Honours the same whitelist /
# issi_allowlist scoping. Set reactive_enabled = false to disable.
#
# [recovery]
# enabled = true                  # proactive boot-time cache replay on/off (default false)
# issi_allowlist = []             # empty = every cached/seen ISSI; non-empty = only these (both modes)
# cache_path = ""                 # explicit path; omit/empty = <config-dir>/recovery_cache.json
# max_replay_attempts = 150       # per-ISSI COMMAND re-sends before giving up (1..=500)
# replay_per_frame = 1            # COMMANDs emitted per TDMA frame during the sweep (1..=18)
# debounce_secs = 5               # coalesce registry changes into one cache write (1..=300)
# max_cached_issis = 1024         # hard cap on cached terminals (1..=65535)
# reactive_enabled = true         # command unknown radios to re-register on sight (default true)
# reactive_cooldown_secs = 10     # min gap between reactive COMMANDs to the same ISSI (2..=120)

###############################################################################

# OPTIONAL: Lite stack-health monitor (FlowStation)
#
# A background sampler rolls a few coarse domains — core-loop liveness, Brew backhaul, attached
# radios, and downlink/SDS congestion — into a small snapshot every few seconds. It surfaces as
# the "HEALTH" badge in the dashboard topbar (green/amber/red with a per-domain tooltip) and, if
# Telegram alerts are configured, sends a message whenever the overall level changes.
#
# The monitor itself is observe-only and harmless, so it defaults ON. The optional software
# WATCHDOG (restart_on_core_stall) restarts the service if the TETRA core loop stops ticking —
# that is RF-/service-affecting, so it defaults OFF and is a deliberate operator choice. The
# whole block can be omitted; these are the defaults.
#
# [health]
# enabled = true                    # master on/off for the monitor (default true)
# snapshot_interval_secs = 5        # how often a snapshot is emitted (1..=300)
# restart_on_core_stall = false     # software watchdog: restart if the core loop stalls (default false)
# core_stall_secs = 10              # core is Critical after no TDMA tick for this long (2..=600)
# restart_after_critical_secs = 30  # how long stalled before a restart is requested (1..=3600)
# restart_cooldown_secs = 600       # minimum spacing between restart requests (10..=86400)
# radios_silent_secs = 900          # FLOOR for the "radios silent" Degraded signal; 0 = off.
                                    # Effective window = max(this, 1.5 x periodic_registration_secs/T351),
                                    # so radios are never flagged inside their T351 re-registration window.
# dl_queue_degraded = 64            # downlink backlog → Congestion Degraded
# dl_queue_critical = 192           # downlink backlog → Congestion Critical
# sds_queue_degraded = 32           # deferred-SDS backlog → Congestion Degraded
# sds_queue_critical = 128          # deferred-SDS backlog → Congestion Critical

###############################################################################

# OPTIONAL: Built-in WX/METAR SDS service (FlowStation)
#
# A weather responder that runs inside FlowStation — no external bot needed.
#
#   On-demand:  a radio sends an SDS like "METAR LROP" (or "WX LROP", or just "LROP")
#               to service_issi and receives a decoded, ASCII report back.
#   Periodic:   FlowStation auto-sends a fixed station's METAR to periodic_issi every
#               periodic_interval_secs (minimum 300 s).
#
# Everything here can also be toggled/edited live from the dashboard (Config page),
# which writes the values back to this section.
#
# [wx_service]
# enabled = true                 # master on/off for the on-demand responder
# service_issi = 9998            # ISSI that radios address to request weather
# periodic_enabled = false       # auto-broadcast a fixed station periodically
# periodic_issi = 1001           # destination (ISSI, or a GSSI if periodic_is_group)
# periodic_is_group = false      # true = periodic_issi is a talkgroup (GSSI)
# periodic_icao = "LROP"         # station whose METAR is auto-sent
# periodic_interval_secs = 1800  # send period in seconds (>= 300)

###############################################################################

# OPTIONAL: Telegram alerts — push notifications to the BTS owner (FlowStation)
#
# Sends professionally-formatted messages to one or more Telegram chats when notable
# things happen: a radio attaches/detaches, a radio is dropped for not answering the
# periodic registration (T351), the Brew backhaul goes up/down, a radio beacons its
# position over LIP/APRS, or the stack logs a WARN/ERROR.
#
# Easiest setup is the dashboard "Telegram Alerts" menu, which guides you through
# creating a bot with @BotFather, detecting your Chat ID with one click, and saving.
# It writes the values back to this section. You can also set it up manually here:
#
#   1. Message @BotFather, send /newbot, and copy the bot token.
#   2. Send your bot any message (e.g. /start) so it can see your chat.
#   3. Find your numeric chat ID (the dashboard's "Detect Chat ID" button does this,
#      or use https://api.telegram.org/bot<TOKEN>/getUpdates and read message.chat.id).
#
# chat_ids: positive = a private chat; negative = a group/channel. Each receives every
# enabled alert. The per-category flags below default to true.
#
# [telegram_alerts]
# enabled = true
# bot_token = "123456789:AAExampleBotTokenStringFromBotFather"
# chat_ids = [123456789]          # one or more; negative IDs are groups/channels
# alert_connect = true            # radio attached
# alert_disconnect = true         # radio detached
# alert_t351 = true               # radio dropped (no response to T351)
# alert_lip = true                # LIP/APRS position beacon
# alert_backhaul = true           # Brew backhaul up/down
# alert_critical_logs = true      # forward the stack's WARN/ERROR log lines

###############################################################################

# OPTIONAL: Emergency-state handling (FlowStation)
#
# A radio signals emergency with a U-STATUS PDU (pre_coded_status = Emergency, status 0,
# ETSI EN 300 392-2 table 14.72), re-sent periodically while active; on exit it sends nothing.
# An emergency CALL (U-SETUP call_priority 15) raises the same state. Emergency is LOCAL-only:
# it raises a persistent dashboard banner and (optionally) a Telegram alert, and is NOT forwarded
# to Brew unless forward_to_brew is set. Because the radio is silent on exit, a session auto-clears
# clear_timeout_secs after the last emergency status (or when the ISSI sends a non-Emergency
# status, or an operator clears it from the dashboard). Always active with these defaults.
#
# [emergency]
# forward_to_brew = false     # also forward the emergency status to Brew (default false, LOCAL-only)
# telegram_alert = true       # Telegram alert when an emergency ENTERS, not on re-sends (default true)
# clear_timeout_secs = 30     # auto-clear after this many seconds with no emergency status (5..=600)

###############################################################################

# OPTIONAL: Web dashboard — accessible at http://<BTS-IP>:8080 (FlowStation)
#
# Live view of terminals, active calls, log, config editor, kick and SDS.
#
# [dashboard]
# port = 8080                    # HTTP port the dashboard listens on (default: 8080; must not be 0)
# bind = "0.0.0.0"               # bind address (default: 0.0.0.0 = all interfaces; use 127.0.0.1 for localhost-only)
#
# OPTIONAL: HTTP Basic Auth — protect the dashboard with a username and password.
# When set, the browser will show a native login dialog on first access.
# Both username and password must be set together, or neither.
#
# SECURITY NOTE: HTTP Basic Auth transmits credentials as base64 (not encrypted).
# This protects against casual/accidental access on a LAN, but is NOT secure over
# the public internet without TLS. For internet-facing use, put a reverse proxy
# with HTTPS (e.g. nginx, Caddy) in front of the dashboard.
#
# username = "admin"
# password = "changeme"
#
# OPTIONAL: public read-only overview (FH-FEAT-033). When true AND username/password
# are set, anonymous visitors see a small read-only status page (radio count, active
# calls, frequency/RF state, network status) and a Log in button — but no controls,
# config, or raw telemetry. Requires auth to be set; inert otherwise. Default: false.
# public_overview = true
#
# OPTIONAL: explicit path to the FlowStation git source directory used by the
# "Update" button. By default the dashboard auto-detects by walking up from the
# binary path looking for a .git directory, then trying /opt/tetra-bluestation,
# /opt/flowstation, /opt/tetra-bs, /opt/tetra. Set this if your binary lives
# outside the git clone (e.g. binary copied to /usr/local/bin/, sources in /opt/...)
# or if auto-detection finds the wrong directory.
# source_dir = "/opt/tetra-bluestation"

###############################################################################

# OPTIONAL: Telemetry export — push live BTS state to a remote collector over a
# WebSocket connection. Inert unless this whole section is present.
#
# If you include it, both `host` and `port` are REQUIRED (no default) — an empty
# [telemetry] header will fail to parse. Uncomment and fill in your collector.
#
# [telemetry]
# host = "telemetry.example.com"     # collector hostname or IP (required)
# port = 443                          # collector port (required)
# use_tls = true                      # OPTIONAL: wss:// instead of ws:// (default false; required if ca_cert set)
# ca_cert = "/etc/tetra-bluestation/telemetry-ca.der"  # OPTIONAL: DER CA cert for private-CA TLS; needs use_tls
# OPTIONAL: HTTP Basic Auth — set both username and password, or neither.
# Basic Auth is base64 (not encrypted); only safe over the internet with use_tls = true.
# username = "bts"
# password = "changeme"

###############################################################################

# OPTIONAL: Control endpoint — outbound control/management connection. When present,
# FlowStation connects to an external control server over WebSocket. Omit this whole
# section to disable it (off by default).
#
# host and port are REQUIRED if the section is present.
#
# [command]
# host = "control.example.com"        # control server address (required when present)
# port = 443                          # control server port (required when present)
# use_tls = true                      # OPTIONAL: wss:// (default false; required if ca_cert set)
# ca_cert = "/etc/tetra-bluestation/control-ca.der"  # OPTIONAL: DER CA cert for private-CA TLS; needs use_tls
# OPTIONAL: HTTP Basic Auth — set both username and password, or neither.
# Basic Auth is base64 (not encrypted); use use_tls = true for anything off-host.
# username = "station"
# password = "changeme"

###############################################################################

# Brew Protocol: Connect to TetraPack/BrandMeister server via TETRA Homebrew Protocol.
# All groups that radios affiliate to are transmitted to Brew as affiliations.
# Uncomment this section to automatically enable the Brew entity.
# See: https://wiki.tetrapack.online/books/tetra/page/brew

# [brew]

# Server address
# host = "core.tetraflow.ro"
# port = 9000

# Use TLS (wss:// / https://)
# tls = true

# HTTP Digest authentication credentials, registered in BrandMeister.
# Username should be your SSID (DMR ID + 2-digit suffix).
# Password is your BrandMeister hotspot password.
# username = 123456700
# password = "012345"

# Reconnect delay (seconds)
# reconnect_delay_secs = 15

# Additional initial latency in frames for inbound Brew jitter playback.
# Default: 0. Increase if you hear audio artifacts at the start of transmissions.
# jitter_initial_latency_frames = 0

# Enable SDS forwarding between local clients and Brew. Enabled by default.
# feature_sds_enabled = true

# Export RSSI measurements to the Brew server as Service (0xf4) JSON messages.
# Disabled by default. Enable if your Brew server supports RSSI data ingestion.
# When enabled, each radio's signal level is sent at most once every 5 seconds.
# Format: {"issi": 2260570, "rssi_dbfs": -42.3}
# feature_rssi_export = false

# OPTIONAL: restrict OUTBOUND Brew forwarding to selected SSIs.
# This is an OUTBOUND-only filter (FH-FEAT-032 R3): only calls/SDS TO these SSIs are
# forwarded from this cell out to Brew. INBOUND Brew traffic is NOT filtered by this
# list — incoming calls/SDS from Brew are still delivered regardless of the whitelist
# (only local_ssi_ranges rejects inbound). If left commented, all calls outside
# local_ssi_ranges are forwarded to Brew.
# whitelisted_ssis = [91]

# Optional PBX gateway ISSIs that should always be considered Brew-routable
# (useful for phone/PBX interconnect IDs that do not follow normal Tetrapack ISSI rules)
# pbx_gateway_issis = [16777184, 16777186]

###############################################################################

# OPTIONAL: DAPNET inbound forwarding (FlowStation)
#
# Receives DAPNET calls from the RWTH core transmitter feed and forwards them,
# depending on the toggles below, as normal SDS, Motorola TPG2200 Call-Out
# (raw Type-4 SDS), and/or via the existing Telegram alert configuration.
#
# Disabled by default. When disabled, FlowStation does not open any DAPNET
# network connection and behaves exactly as before.
#
# SECURITY NOTE: rwth_core_authkey and password are secrets. Keep real values in
# your local config only; do not commit them.
#
# [dapnet]
# enabled = false
# api_url = "https://hampager.de/api/calls"
# username = ""
# password = ""
# poll_interval_secs = 30
#
# forward_sds = false
# forward_callout = false
# forward_telegram = false
#
# sds_source_issi = 9999
# sds_dest_issi = 0
# sds_dest_is_group = false
# ric_issi_routes = { "0632585" = 2632585 }
# ric_gssi_routes = { "0004520" = 80 }
# sds_allowed_rics = []
# callout_allowed_rics = []
# telegram_allowed_rics = []
#
# callout_source_issi = 9999
# callout_dest_issi = 0
# callout_incident_base = 2
# callout_text_prefix = "DAPNET"
#
# telegram_prefix = "DAPNET"
#
# rwth_core_enabled = true
# rwth_core_host = "dapnet.afu.rwth-aachen.de"
# rwth_core_port = 43434
# rwth_core_device = "FlowStation"
# rwth_core_version = "1.0"
# rwth_core_callsign = ""
# rwth_core_authkey = ""
# rwth_messages_limit = 100

###############################################################################

# OPTIONAL: Snom/desk-phone ActionURL trigger for Motorola TPG2200 Call-Out
#
# Configure a Snom function key / ActionURL to call:
#   http://<flowstation>:<dashboard_port>/api/action/tpg2200?token=<token>
#
# Optional text override:
#   http://<flowstation>:<dashboard_port>/api/action/tpg2200?token=<token>&text=ALARM
#
# Every accepted request sends a Type-4 SDS Call-Out to `dest_issi`.
# The incident number starts at `incident_base` and increments in memory
# on every trigger, wrapping after 256.
#
# This endpoint intentionally does not require the dashboard cookie session because phones cannot
# reliably hold it. Keep `token` long/random and do not expose the dashboard port publicly.
#
# [tpg2200_action]
# enabled = false
# token = ""
# source_issi = 9999
# dest_issi = 0
# incident_base = 1
# default_text = "ALARM"
# max_text_chars = 80

###############################################################################

# OPTIONAL: Snom display notifications via Asterisk AMI PJSIPNotify
#
# Sends FlowStation message events to Snom phones as XML minibrowser popups.
# The SIP NOTIFY generated by Asterisk uses:
#   Event: xml
#   Content-Type: application/snomxml
#   Body: SnomIPPhoneText
#
# Snom phone requirement: xml_notify must be enabled on the phone. If Asterisk sends the NOTIFY
# as the registered PBX, the usual registrar filter can stay intact. If you send direct SIP NOTIFY
# from another host instead, Snom requires additional phone-side settings; FlowStation uses AMI
# so Asterisk stays the SIP sender.
#
# Asterisk requirement: AMI must be enabled in manager.conf and the AMI user needs permission to
# execute PJSIPNotify. Configure endpoints as PJSIP endpoint names, e.g. "385".
#
# [snom_notify]
# enabled = false
# ami_host = "127.0.0.1"
# ami_port = 5038
# ami_username = "flowstation"
# ami_password = ""
# endpoints = ["385"]
# notify_sds = true
# notify_dapnet = true
# notify_telegram = true
# sds_directions = ["rx", "net", "tx"]  # rx=TETRA uplink, net=Brew/network, tx=FlowStation/dashboard
# dapnet_allowed_rics = []              # empty = every DAPNET RIC; example: ["0632585", "0000200"]
# sds_allowed_issis = []                # empty = every SDS; source or destination ISSI may match
# title_prefix = "FlowStation"
# notify_event = "xml"
# content_type = "application/snomxml"
# subscription_state = "active;expires=30000"
# max_text_chars = 240
# connect_timeout_secs = 3

###############################################################################

# OPTIONAL: GeoAlarm radius alerts
#
# Watches decoded TETRA LIP SDS positions. When an allowed device enters the
# configured radius around FlowStation, alarms can be forwarded through the
# existing TPG2200, SDS, Snom/SIP and Telegram paths.
# Empty whitelists mean "all"; blacklists always win.
#
# The meshcom_* fields and trigger_meshcom below are accepted by the parser but
# inert in this build: FlowStation does not ship a MeshCom source, so positions
# come from TETRA LIP only. Leave the MeshCom toggles at their defaults.
#
# [geoalarm]
# enabled = false
# flowstation_lat = 0.0
# flowstation_lon = 0.0
# radius_m = 500.0
# cooldown_secs = 300
#
# trigger_tetra = true
# trigger_meshcom = true
#
# forward_tpg2200 = false
# forward_sds = false
# forward_sip = false
# forward_telegram = false
#
# tetra_issi_whitelist = []            # empty = every TETRA ISSI
# tetra_issi_blacklist = []
# meshcom_source_whitelist = []        # empty = every MeshCom source
# meshcom_source_blacklist = []
#
# sds_source_issi = 9999
# sds_dest_issi = 0                    # 0 = not configured
# sds_dest_is_group = false
#
# tpg2200_source_issi = 9999
# tpg2200_dest_issi = 0                # TPG2200 ISSI
# tpg2200_incident_base = 1            # cycles 1..=256
# tpg2200_text_prefix = "GeoAlarm"
# tpg2200_max_text_chars = 80
#
# sip_title_prefix = "GeoAlarm"
# telegram_prefix = "GeoAlarm"

###############################################################################

# OPTIONAL: Asterisk SIP/RTP bridge — parallel to Brew, not a replacement.
# Only destinations listed in service_numbers are routed to Asterisk; everything else
# stays on the normal local/Brew path.
#
# Example: a TETRA dial string 91600 with outbound_prefix="91" and strip=true becomes
# SIP user 600, but only because "600" is listed below.
#
# NOTE: Asterisk support is FEATURE-GATED on FlowStation. The default build does NOT
# include it. To use this section the device binary must be built with
#   cargo build --release --features asterisk
# and requires the native tetra-codec (outerplane) ACELP library installed. The
# default build (DAPNET / Snom / GeoAlarm / dashboard) works without it.

# [asterisk]
# enabled = true
# outbound_prefix = "91"
# strip_outbound_prefix = true
# inbound_prefix = "T"
# register = true
# codec = "PCMU"
# service_numbers = ["600", "601"]
# rtp_port_min = 30000
# rtp_port_max = 30100
# bind_addr = "0.0.0.0"
# bind_port = 5062
# remote_host = "127.0.0.1"
# remote_port = 5060
# contact_host = "127.0.0.1"
# from_domain = "127.0.0.1"
# local_user = "flowstation"
# auth_user = "flowstation"
# password = ""
# realm = "asterisk"
