name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.92.0

      - name: Install cross
        run: cargo install cross --locked --version 0.2.5

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsoapysdr-dev

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Build aarch64
        run: cross build --release -p bluestation-bs --target aarch64-unknown-linux-gnu --locked

      - name: Generate checksum
        run: sha256sum target/aarch64-unknown-linux-gnu/release/bluestation-bs > target/aarch64-unknown-linux-gnu/release/bluestation-bs.sha256

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: bluestation-bs-aarch64-unknown-linux-gnu
          path: |
            target/aarch64-unknown-linux-gnu/release/bluestation-bs
            target/aarch64-unknown-linux-gnu/release/bluestation-bs.sha256

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/aarch64-unknown-linux-gnu/release/bluestation-bs
            target/aarch64-unknown-linux-gnu/release/bluestation-bs.sha256
